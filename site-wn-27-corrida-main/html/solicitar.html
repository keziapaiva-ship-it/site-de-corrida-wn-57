<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solicite sua viagem</title>

    <link rel="stylesheet" href="/css/solicitar.css">

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet" />
  </head>

  <body style="background: linear-gradient(135deg, #ec9cbd, #f5a0c2); margin:0;">

    <!-- NAV -->
    <header>

      <div class="logo">
        <span class="wn">WN</span>
        <span class="num">57</span>
      </div>

      <nav>
        <a href="/html/inicial.html">Inicial</a>
        <a href="/html/solicitar.html">Viajar</a>
        <a href="/html/atividade.html">Atividade</a>
        <a href="/html/login.html">Entrar</a>
        <a href="#">Ajuda</a>
      </nav>

      <button class="btn-menu">
        Cadastrar
      </button>

    </header>

    <!-- HERO -->
    <section class="hero">
      <h1>Va para qualquer lugar<br /><em>com o app WN</em></h1>
      <p>Escolha o veículo perfeito, calcule sua rota e chegue com estilo.</p>
    </section>

    <!-- CARD -->
    <div class="route-card">

      <div class="input-group">
        <input id="origem" placeholder="Sua localização">
        <button class="btn-loc" onclick="pegarGPS()">📍</button>
      </div>

      <div class="input-group">
        <input id="destino" placeholder="Para onde você vai?" oninput="buscarSugestoes(this.value)">
      </div>

      <ul id="sugestoes"></ul>

      <!-- BOTÃO CORRIGIDO -->
      <button class="btn-calc" onclick="salvarCorrida()">
        Solicitar corrida
      </button>

    </div>

    <script src="/javascript/solicita.js"></script>

  </body>

</html>
