<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Cliente - Objetivo principal - WN57</title>

    <link rel="stylesheet" href="/css/cadastro.css">

    <!-- fonte -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
</head>

<body style="background: linear-gradient(135deg, #ec9cbd, #f5a0c2); margin:0;">

    <!-- menu -->
    <header>

        <div class="logo">
            <span class="wn">WN</span>
            <span class="num">57</span>
        </div>

        <nav>
            <a href="/html/inicial.html">Inicial</a>
            <a href="/html/solicitar.html">Viajar</a>
            <a href="/html/atividade.html">Atividade</a>
            <a href="/html/login.html">Entrar</a>
            <a href="/html/ajuda.html">Ajuda</a>
        </nav>

        <button class="btn-menu">Cadastrar</button>

    </header>

    <!-- cadastro -->
    <div class="container">
        <main>
            <section class="sessao">

                <form action="/enviar-dados" method="post">

                    <h1>Qual é seu número de telefone ou e-mail?</h1>

                    <div class="informacoes">

                        <div class="nome">
                            <label for="nome">Nome completo</label>
                            <input type="text" id="nome" name="nome" placeholder="Nome completo" required>
                        </div>

                        <div class="email">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" placeholder="E-mail" required>
                        </div>

                        <div class="date">
                            <label for="date">Data de nascimento</label>
                            <input type="date" id="date" name="date" required>
                        </div>

                        <div class="telefone">
                            <label for="telefone">Telefone</label>
                            <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" required>
                        </div>

                        <div class="senha">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                        </div>

                        <div class="confirmacao-senha">
                            <label for="confirmacao-senha">Confirmar senha</label>
                            <input type="password" id="confirmacao-senha" name="confirmacao_senha"
                                placeholder="Confirme sua senha" required>
                        </div>

                    </div>

                    <!-- Google login -->
                    <script src="https://accounts.google.com/gsi/client" async defer></script>

                    <div id="g_id_onload"
                        data-client_id="86008452356-253qos5sqh3t35olmsdkqekkp06kgrs2.apps.googleusercontent.com"
                        data-callback="handleCredentialResponse" data-auto_select="false" data-itp_support="true">
                    </div>

                    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline"
                        data-text="sign_in_with" data-shape="pill">
                    </div>

                    <button type="submit">Cadastrar</button>

                </form>

            </section>
        </main>
    </div>

    <script src="/javascript/cadastro.js"></script>

    <div class="route-card"></div>

</body>

</html>
