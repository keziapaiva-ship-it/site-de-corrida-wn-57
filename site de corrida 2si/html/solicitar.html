<body>

  <div class="route-card">

    <!-- ORIGEM -->
    <div class="input-group">
      <input id="origem" placeholder="Sua localização">
      <button class="btn-loc" onclick="pedirLocalizacao()">📍</button>
    </div>

    <!-- DESTINO -->
    <div class="input-group">
      <input id="destino" placeholder="Para onde você vai?" oninput="buscarSugestoes(this.value)">
    </div>

    <!-- LISTA -->
    <ul id="sugestoes"></ul>

    <!-- BOTÃO -->
    <button onclick="verPrecos()" class="btn-calc"><a href="/html/corrida.html">verPrecos</a>
    </button>
  </div>


  <!-- localizaçao -->
  <script>
   navigator.geolocation.getCurrentPosition(
  async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    console.log("PEGOU GPS");

    try {
      const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`;
      console.log("URL:", url);

      const res = await fetch(url);
      console.log("STATUS:", res.status);

      const data = await res.json();
      console.log("RESPOSTA:", data);

      // 👇 FORÇA aparecer algo
      document.getElementById("origem").value =
        data.display_name || "SEM NOME";

    } catch (e) {
      console.log("ERRO FETCH:", e);

      document.getElementById("origem").value = "ERRO API";
    }
  },
  (erro) => {
    console.log("ERRO GPS:", erro);
  }
);
    // 🔍 SUGESTÕES (CURITIBA/PINHAIS)
    async function buscarSugestoes(texto) {
      if (texto.length < 3) return;

      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${texto}&limit=5&countrycodes=br&viewbox=-49.45,-25.65,-49.10,-25.30&bounded=1`
      );

      const data = await res.json();

      const lista = document.getElementById("sugestoes");
      lista.innerHTML = "";

      data.forEach(lugar => {
        const li = document.createElement("li");
        li.innerText = lugar.display_name;

        li.onclick = () => {
          document.getElementById("destino").value = lugar.display_name;
          lista.innerHTML = "";
        };

        lista.appendChild(li);
      });
    }

    // 🚀 IR PRO MAPA
    function irParaMapa() {
      const origem = document.getElementById("origem").value;
      const destino = document.getElementById("destino").value;

      if (!origem || !destino) {
        alert("Preencha tudo");
        return;
      }

      window.location.href =
        `mapa.html?origem=${encodeURIComponent(origem)}&destino=${encodeURIComponent(destino)}`;
    }

  </script>

  <!--fundo rosa gradient -->

  background: linear-gradient(135deg, #ec9cbd, #f5a0c2);

">
